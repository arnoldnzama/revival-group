  <link rel="stylesheet" href="css/home.css" />
  <style>
    .vid-comment__time { font-size: 11px; color: var(--gray); margin-left: 8px; font-weight: 400; }
    .vid-like.liked { color: var(--accent); }
    .vid-like.liked svg { fill: var(--accent); stroke: var(--accent); }
    .vid-like { transition: transform .2s; }
    @media (max-width: 768px) {
      section[style*="grid-template-columns:1.4fr"] { grid-template-columns: 1fr !important; }

</head>
<body>
  <div id="header-placeholder"></div>

  <!-- HERO -->
  <section style="min-height:44vh;background:radial-gradient(ellipse at 70% 0%,#0a2a6e 0%,#050d2a 55%,#000d1f 100%);display:flex;align-items:center;padding:140px 0 70px;position:relative;overflow:hidden;">
    <div class="hero__bg"><div class="blob blob--1"></div><div class="blob blob--2"></div><div class="grid-lines"></div></div>
    <div class="container fade-up" style="position:relative;z-index:1;text-align:center;color:#fff">
      <span class="badge badge--light">Chaîne Revival</span>
      <h1 style="font-size:clamp(36px,5vw,62px);margin:12px 0 20px;letter-spacing:-.03em">Nos <span class="gradient-text">Vidéos</span></h1>
      <p style="font-size:17px;color:rgba(255,255,255,.6);max-width:520px;margin:0 auto 28px">Découvrez nos tutoriels, présentations de projets et coulisses de l'agence Revival.</p>
      <a href="https://www.youtube.com/@RevivalGroupe" target="_blank" rel="noopener" class="btn btn--primary">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        S'abonner sur YouTube
      </a>
    </div>
  </section>

  

  <!-- SHORTS REVIVAL GROUPE -->
  <section class="section" style="padding:80px 0">
    <div class="container">
      <div style="text-align:center;margin-bottom:48px" class="fade-up">
        <span class="badge">Shorts</span>
        <h2 style="font-size:clamp(26px,3.5vw,44px);margin:12px 0 16px;letter-spacing:-.03em">Shorts <span class="gradient-text">@RevivalGroupe</span></h2>
        <p style="color:var(--gray);font-size:16px;max-width:560px;margin:0 auto">Retrouvez tous nos Shorts YouTube — conseils, demos produits et coulisses de l'agence.</p>
      </div>

      <!-- Grid de 6 videos par page -->
      <div class="vid-grid stagger-children" id="shortsGrid"></div>

      <!-- Pagination -->
      <div id="paginationBar" style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:48px;flex-wrap:wrap">
        <button id="btnPrev" style="display:flex;align-items:center;gap:8px;padding:12px 24px;border:1.5px solid var(--border);border-radius:50px;background:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s" onmouseover="this.style.borderColor='#019cd6';this.style.color='#019cd6'" onmouseout="this.style.borderColor='var(--border)';this.style.color=''">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Precedent
        </button>
        <div id="pageNumbers" style="display:flex;gap:8px"></div>
        <button id="btnNext" style="display:flex;align-items:center;gap:8px;padding:12px 24px;border:1.5px solid var(--border);border-radius:50px;background:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s" onmouseover="this.style.borderColor='#019cd6';this.style.color='#019cd6'" onmouseout="this.style.borderColor='var(--border)';this.style.color=''">
          Suivant
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div id="pageInfo" style="text-align:center;margin-top:16px;font-size:13px;color:var(--gray)"></div>
    </div>
  </section>

  <!-- VIDEO MODAL -->
  <div class="vid-modal" id="vidModal" role="dialog" aria-modal="true" aria-label="Lecteur vidéo">
    <div class="vid-modal__backdrop" id="vidModalBackdrop"></div>
    <div class="vid-modal__inner">
      <button class="vid-modal__close" id="vidModalClose" aria-label="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="vid-modal__frame">
        <iframe id="vidIframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen title="Vidéo Revival"></iframe>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="js/seo.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
  const SHORTS = [
    { id: 'X30WWQVMthE', title: "Découvrez l'interface de l'application KULATABLE, une solution pour la gestion de vos restaurants.", cat: 'projet', duration: '0:30', thumb: 'projet/kulatable.png' },
    { id: 'dJn4ugANCLg', title: 'FACILITEZ VOUS LA TACHE AVEC LA POSHUB, UNE GESTION INTELLIGENTE DE VOTRE ENTREPRISE', cat: 'projet', duration: '0:15' },
    { id: 'V0iWwb_AYM8', title: 'VOUS AVEZ DU MAL A GERER VOTRE PHARMACIE? REJOIGNEZ PHARMA HUB UNE SOLUTION DIGITALE SUR MESURE.', cat: 'projet', duration: '0:58', thumb: 'videos/img_video/pharmhub.png' },
    { id: 'dJn4ugANCLg', title: 'Comment creer une app mobile en 2026 ?', cat: 'tuto', duration: '0:52' },
    { id: 'dJn4ugANCLg', title: "Revival - 3 ans d'innovation technologique en RDC", cat: 'coulisse', duration: '1:00' },
    { id: 'C5gmtimkAR4', title: 'Vous souhaitez lancer votre boutique en ligne sur EMICARD ? Découvrez la réponse dans cette vidéo.', cat: 'projet', duration: '0:30' },
  ];

  const API = 'https://revival-business.com/php/video_interactions.php';
  const PER_PAGE = 3;
  let currentPage = 1;

  function getTotalPages() { return Math.ceil(SHORTS.length / PER_PAGE); }

  // ── Helpers ───────────────────────────────────────────────
  function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
           d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  }

  function renderComment(c) {
    const author   = c.author || 'Anonyme';
    const text     = c.text || c.content || '';
    const initials = author.substring(0, 2).toUpperCase();
    const colors   = ['#019cd6,#035194','#38619c,#76d0ec','#76d0ec,#035194'];
    const color    = colors[(c.id || 0) % colors.length];
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;gap:10px;align-items:flex-start;padding:10px;background:#f8fafc;border-radius:10px;margin-bottom:8px';
    div.innerHTML = `
      <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,${color});display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0">${initials}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <strong style="font-size:13px">${author}</strong>
          <span style="font-size:11px;color:var(--gray)">${formatDate(c.created_at)}</span>
        </div>
        <p style="font-size:13px;color:#374151;margin:0;word-break:break-word">${text}</p>
      </div>`;
    return div;
  }

  // ── Charger stats ─────────────────────────────────────────
  async function loadStats(videoId, cardKey) {
    try {
      const resV  = await fetch(`${API}?action=get_video&vid=${encodeURIComponent(videoId)}`);
      const dataV = await resV.json();
      if (dataV.success) {
        const likeBtn = document.querySelector(`.vid-like-btn[data-key="${cardKey}"]`);
        if (likeBtn) likeBtn.querySelector('.like-count').textContent = dataV.data.likes_count || 0;
      }
      const resC  = await fetch(`${API}?action=get_comments&vid=${encodeURIComponent(videoId)}&limit=50`);
      const dataC = await resC.json();
      if (dataC.success) {
        const comments = dataC.data.comments || [];
        const countEl  = document.querySelector(`.vid-comment-toggle[data-key="${cardKey}"] .comment-count`);
        if (countEl) countEl.textContent = dataC.data.pagination.total || comments.length;
        const list = document.querySelector(`.vid-comments-box[data-key="${cardKey}"] .vid-comments-list`);
        if (list && comments.length) {
          list.innerHTML = '';
          comments.forEach(c => list.appendChild(renderComment(c)));
        }
      }
    } catch(e) { console.warn('Stats non chargées pour', videoId, e); }
  }

  // ── Attacher les interactions après chaque rendu ──────────
  function bindInteractions(grid) {
    // Modal
    grid.querySelectorAll('.vid-card__thumb').forEach(thumb => {
      thumb.addEventListener('click', () => {
        const ytId    = thumb.dataset.yt;
        const isShort = thumb.dataset.short === '1';
        const iframe  = document.getElementById('vidIframe');
        iframe.src = 'https://www.youtube.com/embed/' + ytId + '?autoplay=1&rel=0' + (isShort ? '&loop=1&playlist=' + ytId : '');
        document.getElementById('vidModal').classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    // Like
    grid.querySelectorAll('.vid-like-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const videoId = btn.dataset.videoId;
        const cardKey = btn.dataset.key;
        btn.disabled = true;
        try {
          const res  = await fetch(`${API}?action=add_like`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ video_id: videoId })
          });
          const data = await res.json();
          if (data.success) {
            const liked = data.data.liked;
            const resV  = await fetch(`${API}?action=get_video&vid=${encodeURIComponent(videoId)}`);
            const dataV = await resV.json();
            if (dataV.success) btn.querySelector('.like-count').textContent = dataV.data.likes_count;
            btn.classList.toggle('liked', liked);
            btn.style.borderColor = liked ? '#019cd6' : '';
            btn.style.color       = liked ? '#019cd6' : '';
            btn.style.transform   = 'scale(1.25)';
            setTimeout(() => btn.style.transform = '', 200);
          }
        } catch(e) { console.warn('Like échoué', e); }
        btn.disabled = false;
      });
    });

    // Toggle commentaires
    grid.querySelectorAll('.vid-comment-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const cardKey = btn.dataset.key;
        const box   = grid.querySelector(`.vid-comments-box[data-key="${cardKey}"]`);
        const open  = box.style.display !== 'none' && box.style.display !== '';
        box.style.display = open ? 'none' : 'block';
      });
    });

    // Soumettre commentaire
    grid.querySelectorAll('.vid-comment-form').forEach(form => {
      form.addEventListener('submit', async e => {
        e.preventDefault();
        const videoId   = form.dataset.videoId;
        const cardKey   = form.dataset.key;
        const author    = form.querySelector('.vid-author-input').value.trim();
        const text      = form.querySelector('.vid-text-input').value.trim();
        if (!text) return;
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = '…';
        try {
          const res  = await fetch(`${API}?action=add_comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ video_id: videoId, author, text })
          });
          const data = await res.json();
          if (data.success) {
            const list = form.closest('.vid-comments-box').querySelector('.vid-comments-list');
            const node = renderComment(data.data);
            list.appendChild(node);
            node.scrollIntoView({ behavior:'smooth', block:'nearest' });
            form.querySelector('.vid-text-input').value   = '';
            form.querySelector('.vid-author-input').value = '';
            const countEl = grid.querySelector(`.vid-comment-toggle[data-key="${cardKey}"] .comment-count`);
            if (countEl) countEl.textContent = parseInt(countEl.textContent || 0) + 1;
          }
        } catch(e) { alert("Erreur lors de l'envoi. Réessayez."); }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Envoyer';
      });
    });

    // Charger les stats pour chaque vidéo visible
    grid.querySelectorAll('.vid-interact').forEach(el => loadStats(el.dataset.videoId, el.dataset.key));
  }

  // ── Rendu des cartes ──────────────────────────────────────
  function renderPage(page) {
    currentPage = Math.max(1, Math.min(page, getTotalPages()));
    const grid  = document.getElementById('shortsGrid');
    const start = (currentPage - 1) * PER_PAGE;
    const items = SHORTS.slice(start, start + PER_PAGE);
    const catLabels = { projet: 'Projet', tuto: 'Tutoriel', coulisse: 'Coulisse', conseil: 'Conseil' };

    grid.innerHTML = items.map((v, i) => {
      const thumbSrc = v.thumb || ('https://img.youtube.com/vi/' + v.id + '/mqdefault.jpg');
      const cardKey  = `short-${start + i}`;
      return `
        <div class="vid-card" data-cat="${v.cat}" style="animation-delay:${i * 0.08}s">
          <div class="vid-card__thumb" data-yt="${v.id}" data-short="1">
            <img src="${thumbSrc}" alt="${v.title}" loading="lazy" />
            <div class="vid-card__play"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M8 5v14l11-7z"/></svg></div>
            <span class="vid-card__duration">${v.duration}</span>
            <span class="vid-card__cat-badge">${catLabels[v.cat] || v.cat}</span>
          </div>
          <div class="vid-card__body vid-interact" data-video-id="${v.id}" data-key="${cardKey}">
            <h3 class="vid-card__title">${v.title}</h3>
            <p class="vid-card__meta">Revival Groupe &middot; Shorts</p>
            <div class="vid-card__actions" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px">
              <a href="https://www.youtube.com/shorts/${v.id}" target="_blank" rel="noopener"
                 style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);font-weight:600;text-decoration:none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                Voir sur YouTube
              </a>
              <!-- Like -->
              <button class="vid-like-btn" data-video-id="${v.id}" data-key="${cardKey}"
                style="display:flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--border);border-radius:50px;background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                <span class="like-count">0</span>
              </button>
              <!-- Toggle commentaires -->
              <button class="vid-comment-toggle" data-key="${cardKey}"
                style="display:flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--border);border-radius:50px;background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="comment-count">0</span> commentaires
              </button>
            </div>
            <!-- Zone commentaires -->
            <div class="vid-comments-box" data-key="${cardKey}" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
              <div class="vid-comments-list" style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;margin-bottom:12px"></div>
              <form class="vid-comment-form" data-video-id="${v.id}" data-key="${cardKey}" style="display:flex;flex-direction:column;gap:8px">
                <input class="vid-author-input" type="text" placeholder="Votre nom (optionnel)"
                  style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none" />
                <textarea class="vid-text-input" rows="2" placeholder="Écrire un commentaire…" required
                  style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;resize:none;outline:none"></textarea>
                <button type="submit"
                  style="align-self:flex-end;padding:8px 20px;background:linear-gradient(135deg,#019cd6,#035194);color:#fff;border:none;border-radius:50px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">
                  Envoyer
                </button>
              </form>
            </div>
          </div>
        </div>`;
    }).join('');

    bindInteractions(grid);
    renderPagination();
  }

  function renderPagination() {
    const total   = getTotalPages();
    const nums    = document.getElementById('pageNumbers');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');

    nums.innerHTML = '';
    for (let i = 1; i <= total; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      const isActive = i === currentPage;
      btn.style.cssText = 'width:40px;height:40px;border-radius:50%;border:1.5px solid ' +
        (isActive ? 'transparent' : 'var(--border)') + ';background:' +
        (isActive ? 'linear-gradient(135deg,#019cd6,#035194)' : '#fff') + ';color:' +
        (isActive ? '#fff' : 'var(--black)') +
        ';font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s';
      btn.addEventListener('click', () => renderPage(i));
      nums.appendChild(btn);
    }

    const atFirst = currentPage === 1;
    const atLast  = currentPage === total;

    btnPrev.disabled      = atFirst;
    btnPrev.style.opacity = atFirst ? '0.4' : '1';
    btnPrev.style.cursor  = atFirst ? 'not-allowed' : 'pointer';

    btnNext.disabled      = atLast;
    btnNext.style.opacity = atLast ? '0.4' : '1';
    btnNext.style.cursor  = atLast ? 'not-allowed' : 'pointer';

    document.getElementById('pageInfo').textContent =
      'Page ' + currentPage + ' sur ' + total + ' — ' + SHORTS.length + ' vidéos au total';
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderPage(1);

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentPage > 1) renderPage(currentPage - 1);
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (currentPage < getTotalPages()) renderPage(currentPage + 1);
    });
  });
  </script>

  <!-- VIDEO MODAL -->
  <div class="vid-modal" id="vidModal" role="dialog" aria-modal="true" aria-label="Lecteur vidéo">
    <div class="vid-modal__backdrop" id="vidModalBackdrop"></div>
    <div class="vid-modal__inner">
      <button class="vid-modal__close" id="vidModalClose" aria-label="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="vid-modal__frame">
        <iframe id="vidIframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen title="Vidéo Revival"></iframe>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    // ── Modal close ───────────────────────────────────────────
    const modal  = document.getElementById('vidModal');
    const iframe = document.getElementById('vidIframe');
    function closeModal() {
      modal.classList.remove('open');
      iframe.src = '';
      document.body.style.overflow = '';
    }
    document.getElementById('vidModalClose').addEventListener('click', closeModal);
    document.getElementById('vidModalBackdrop').addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
